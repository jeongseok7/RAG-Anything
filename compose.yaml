# Podman/Docker compose file for RAG-Anything
# Neo4j + Qdrant + Docling + LiteLLM + Cohere Reranker
#
# Usage:
#   podman compose up --build
#   podman compose run --rm raganything python examples/example.py
#   podman compose run --rm raganything bash
#
# Environment variables from .env are loaded via --env-file .env

services:
  neo4j:
    image: neo4j:5.26
    container_name: raganything-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-raganything}
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-raganything}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: raganything-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  raganything:
    build:
      context: .
      dockerfile: Dockerfile
    image: raganything:local
    container_name: raganything
    ports:
      - "${PORT:-9621}:${PORT:-9621}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Neo4j connection (internal network)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-raganything}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-raganything}

      # Qdrant connection (internal network)
      QDRANT_URL: http://qdrant:6333

      # Model caches — mapped to host volumes
      HF_HOME: /root/.cache/huggingface
      MODELSCOPE_CACHE: /root/.cache/modelscope

      # Container-internal paths for volumes
      INPUT_DIR: /app/inputs
      OUTPUT_DIR: /app/output
      TIKTOKEN_CACHE_DIR: /app/tiktoken_cache

    volumes:
      - ./inputs:/app/inputs
      - ./rag_storage:/app/rag_storage
      - ./output:/app/output
      - ./tiktoken_cache:/app/tiktoken_cache
      - ${HF_HOME_HOST:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${MODELSCOPE_CACHE_HOST:-~/.cache/modelscope}:/root/.cache/modelscope

    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

    tty: false
    stdin_open: false

  lightrag-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: lightrag-mcp:local
    container_name: raganything-mcp
    # Localhost-only publish — no LAN/external exposure.
    ports:
      - "127.0.0.1:8000:8000"
    command:
      - python
      - src/lightrag_mcp/main.py
      - --mcp-transport
      - streamable-http
      - --mcp-host
      - 0.0.0.0
      - --mcp-port
      - "8000"
      - --mcp-streamable-http-path
      - /mcp
      - --mcp-stateless-http
      - --host
      - raganything
      - --port
      - "9621"
      - --api-key
      - ${LIGHTRAG_API_KEY:-}
    depends_on:
      raganything:
        condition: service_started

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  qdrant_data: